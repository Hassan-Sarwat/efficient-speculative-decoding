services:
  # Unified service: training, distillation, and benchmarking all run in the
  # same image. Override `command` per invocation to choose the pipeline.
  pipeline:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    volumes:
      - model_cache:/app/models
      - ../data:/app/data
      - ../outputs:/app/outputs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    environment:
      - WANDB_API_KEY=${WANDB_API_KEY}
    # Default to the training pipeline; override with e.g.
    #   docker compose run --rm pipeline bash scripts/benchmark_pipeline.sh -t cot -s easy
    command: [ "bash", "./scripts/train_pipeline.sh" ]

volumes:
  model_cache:
